<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Cowboy — VLEO Debris Remediation</title>

  <style>
    /* === RESET & BASE === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      color: #00ff88;
    }

    /* === CANVAS === */
    #game-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* === HUD OVERLAY === */
    #hud-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* ST-6.4: Strategic map mode — dim gameplay HUD */
    #hud-overlay.map-mode {
      opacity: 0.15;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .hud-panel {
      position: absolute;
      background: rgba(5, 10, 20, 0.95);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 4px;
      padding: 6px 8px;
      pointer-events: none;
      /* backdrop-filter REMOVED — was causing ~40 % GPU on M4 Max even when
         WebGL render was skipped. Chrome re-runs the blur shader every
         composite frame for every visible element with backdrop-filter
         (even when the backdrop pixels haven't changed). With ~10
         `.hud-panel` elements on a 5K × 120 Hz display this dominated the
         compositor cost. The opaque 0.95-alpha background is sufficient
         contrast; the blur was cosmetic, not informational. */
      font-size: 13px;
      color: #00ff88;
      font-family: 'Courier New', monospace;
    }

    /* ST-2.2: High-opacity fallback when panels overlap bright Earth */
    .hud-panel--earth-overlap {
      background: rgba(5, 10, 20, 0.98) !important;
    }

    /* Hover-to-expand for left-column panels */
    .hud-panel-expandable {
      pointer-events: auto;  /* Enable hover detection */
      cursor: default;
    }

    .hud-panel-expandable .panel-expand-section {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.2s ease,
                  margin 0.2s ease, border-color 0.2s ease;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      border-top: 1px solid transparent;
    }

    .hud-panel-expandable:hover .panel-expand-section,
    .hud-panel-expandable.force-expand .panel-expand-section {
      max-height: 200px;  /* Generous max — actual height determined by content */
      opacity: 1;
      padding-top: 4px;
      padding-bottom: 2px;
      margin-top: 4px;
      border-top-color: rgba(0,255,136,0.15);
    }

    /* Arm hover details — revealed when fleet panel hovered */
    .hud-panel-expandable:hover .arm-hover-detail,
    .hud-panel-expandable.force-expand .arm-hover-detail {
      display: block !important;  /* Override inline display:none */
    }

    /* Energy hint — more visible on hover */
    .hud-panel-expandable:hover .energy-hint {
      opacity: 0.7 !important;
    }

    /* F11: Horizontal-expand left panels (PROPULSION + ENERGY) */
    .hud-panel-h-expand {
      width: 110px;
      overflow: hidden;
      transition: width 0.3s ease;
      position: relative;
    }
    .hud-panel-h-expand:hover {
      width: 260px;
    }
    .hud-panel-h-expand .panel-full-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.2s ease 0.1s;
    }
    .hud-panel-h-expand:hover .panel-full-content {
      max-height: 600px;
      opacity: 1;
    }
    .hud-panel-h-expand .panel-collapsed-summary {
      opacity: 1;
      transition: opacity 0.15s ease, max-height 0.2s ease;
      overflow: hidden;
      padding: 2px 0;
    }
    .hud-panel-h-expand:hover .panel-collapsed-summary {
      opacity: 0;
      max-height: 0 !important;
      overflow: hidden;
      pointer-events: none;
    }

    /* === LEFT-COLUMN FLEX LAYOUT (always-expanded panels) === */
    #hud-left-column {
      display: flex;           /* safety net: JS sets this inline, but preserve it if cleared */
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,255,136,0.2) transparent;
    }

    /* Panels inside left column: flex children, not absolute */
    #hud-left-column > .hud-panel {
      position: relative !important;
      width: 260px;
    }

    /* Always show full content */
    #hud-left-column .panel-full-content {
      max-height: none !important;
      opacity: 1 !important;
    }

    /* === PaneChrome 2-step: minimize left-column panels to their summary === */
    /* When a left-column panel is on its 'min' step, flip the always-expanded
       default above: hide the full content. */
    #hud-left-column .hud-panel.pane-step-min .panel-full-content {
      max-height: 0 !important;
      opacity: 0 !important;
      overflow: hidden !important;
      pointer-events: none !important;
    }

    /* MOTHER pane: the inner Propulsion / Energy .panel-full-content blocks are
       always "open" — their show/hide is driven by the .mother-detail wrapper
       (hover-expand / pinned), not by the pane-step-min flip above. Override so
       the min step (compact digest) doesn't double-collapse the inner content.
       NOTE: must out-specify the suppressor above
       (`#hud-left-column .hud-panel.pane-step-min .panel-full-content`, 1 id +
       3 classes). Scoping under #hud-left-column gives 2 ids + 2 classes so this
       wins the !important tie — otherwise the hover-reveal shows an empty box. */
    #hud-left-column #hud-mother-panel.pane-step-min .panel-full-content {
      max-height: none !important;
      opacity: 1 !important;
      overflow: visible !important;
      pointer-events: auto !important;
    }

    /* Left-column panels: auto pointer-events for hover detection */
    #hud-mother-panel,
    #hud-power-panel,
    #hud-arms-panel {
      pointer-events: auto;
    }

    /* === MOTHER pane: digest-led, hover-expand detail ===
       The MOTHER pane leads with a one-line readiness digest and hides the full
       Propulsion + Energy detail by default. Hovering the pane reveals it
       (StatusPanel also toggles .mother-expanded on hover). */
    #hud-mother-panel .mother-detail {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.2s ease 0.05s;
    }
    #hud-mother-panel:hover .mother-detail,
    #hud-mother-panel.mother-expanded .mother-detail {
      max-height: 720px;
      opacity: 1;
    }
    /* Nested Propulsion / Energy blocks must NOT render their own boxed
       border/background — only the MOTHER container is a visible box. */
    #hud-mother-panel .mother-block {
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      position: relative;
    }

    /* The MOTHER pane is hover-reveal, so its PaneChrome resize badge (the small
       +/− glyph) is redundant clutter — hide it. */
    #hud-mother-panel .hud-pane-badge {
      display: none !important;
    }

    .hud-panel[style*="pointer-events: auto"],
    .hud-panel.interactive {
      pointer-events: auto;
    }

    /* === RESOURCE BARS === */
    .hud-resource-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 3px 0;
      font-size: 11px;
    }

    .hud-resource-row > span:first-child {
      width: 42px;
      flex-shrink: 0;
    }

    .hud-bar-track {
      flex: 1;
      height: 8px;
      background: rgba(0, 255, 136, 0.1);
      border-radius: 2px;
      overflow: hidden;
      min-width: 80px;
    }

    .hud-bar-fill {
      height: 100%;
      background: #00ff88;
      border-radius: 2px;
      transition: width 0.3s ease, background-color 0.5s ease;
    }

    /* === Left-column pane readability (Propulsion / Energy / Daughters) ===
       These three panes carry the densest small-font telemetry, so they get a
       crisper monospace stack with grayscale antialiasing (Courier New renders
       muddy below ~12px), tighter line metrics, and higher-contrast titles. */
    #hud-mother-panel,
    #hud-power-panel,
    #hud-arms-panel {
      font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', 'Roboto Mono',
                   Menlo, Consolas, 'Courier New', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: 0.015em;
      text-rendering: optimizeLegibility;
    }

    /* Pane titles — bump size/weight/contrast so the section is scannable */
    #hud-mother-panel .pane-title,
    #hud-power-panel .pane-title,
    #hud-arms-panel .pane-title {
      font-size: 12px !important;
      font-weight: 700;
      letter-spacing: 0.14em;
      opacity: 0.95 !important;
      text-shadow: 0 0 8px rgba(0, 255, 136, 0.35);
    }

    /* Resource / power / fleet rows — larger, bolder labels and readouts */
    #hud-mother-panel .hud-resource-row { font-size: 12px; }
    #hud-power-panel .power-label,
    #hud-power-panel .power-value {
      font-size: 11px !important;
      font-weight: 600;
    }
    #hud-arms-panel #hud-arms-status {
      font-size: 11px !important;
      line-height: 1.6 !important;
    }

    /* === GLOW TEXT === */
    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 10px rgba(0,255,136,0.5); }
      50% { text-shadow: 0 0 20px rgba(0,255,136,0.8), 0 0 40px rgba(0,255,136,0.3); }
    }

    .glow-text {
      animation: glowPulse 2s ease-in-out infinite;
    }

    /* === SCREEN OVERLAYS === */
    #menu-screen, #briefing-screen, #shop-screen, #gameover-screen {
      font-family: 'Courier New', monospace;
    }

    /* === SCROLLBAR STYLING === */
    .hud-panel::-webkit-scrollbar,
    #shop-screen ::-webkit-scrollbar,
    #briefing-screen ::-webkit-scrollbar {
      width: 4px;
    }

    .hud-panel::-webkit-scrollbar-track,
    #shop-screen ::-webkit-scrollbar-track,
    #briefing-screen ::-webkit-scrollbar-track {
      background: rgba(0,255,136,0.05);
    }

    .hud-panel::-webkit-scrollbar-thumb,
    #shop-screen ::-webkit-scrollbar-thumb,
    #briefing-screen ::-webkit-scrollbar-thumb {
      background: rgba(0,255,136,0.2);
      border-radius: 2px;
    }

    /* === BUTTON FOCUS === */
    button:focus {
      outline: 1px solid rgba(0,255,136,0.5);
      outline-offset: 2px;
    }

    /* === RETICLE CANVAS === */
    #reticle-canvas,
    #navsphere-canvas {
      image-rendering: crisp-edges;
    }

    /* === RESPONSIVE HUD === */
    @media (max-width: 768px) {
      .hud-panel { font-size: 11px; padding: 6px 8px; }
      #hud-targets-panel { display: none !important; }
      #hud-controls-panel { display: none !important; }
      #hud-comms-panel { display: none !important; }
    }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 1s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-screen h1 {
      font-family: 'Courier New', monospace;
      color: #00ff88;
      font-size: 2.5rem;
      letter-spacing: 0.3em;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }

    #loading-screen p {
      font-family: 'Courier New', monospace;
      color: rgba(0, 255, 136, 0.6);
      font-size: 0.9rem;
    }
  </style>

  <!-- §13: importmap MUST be parsed before any module preload/load that uses
       bare specifiers like `import * as THREE from 'three'`. Previously the
       modulepreload of ./js/main.js was placed BEFORE the importmap, which
       caused an intermittent browser race: main.js was fetched + its imports
       resolved before the importmap registered, throwing
       "Failed to resolve module specifier 'three'". Moved importmap above
       all modulepreload tags to permanently eliminate the race. -->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/build/three.module.js",
      "three/addons/": "./vendor/three/examples/jsm/"
    }
  }
  </script>

  <!-- PR P0.2 — Resource hints: preload critical modules and the first Earth
       texture so the browser can fetch them in parallel with parsing the
       import map. Three.js is vendored same-origin under ./vendor/ (relative
       paths resolve to '/' locally and '/SCB/' on GitHub Pages) so the sim is
       fully offline-first — no CDN, no internet dependency at runtime. -->
  <link rel="modulepreload" href="./js/main.js">
  <link rel="modulepreload" href="./vendor/three/build/three.module.js">
  <link rel="preload" as="image" href="./textures/earth_day.avif" type="image/avif" fetchpriority="high">
</head>
<body>
  <!-- F7: JavaScript is required — this is the only content non-JS visitors see. -->
  <noscript>
    <div style="position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;
                align-items:center;justify-content:center;background:#000;color:#00ff88;
                font-family:'Courier New',monospace;text-align:center;padding:24px;">
      <div style="font-size:2rem;letter-spacing:0.25em;margin-bottom:14px;">SPACE COWBOY</div>
      <div style="max-width:520px;color:rgba(0,255,136,0.7);line-height:1.6;">
        This simulation needs JavaScript and a WebGL2-capable browser.
        Please enable JavaScript and reload.
      </div>
    </div>
  </noscript>

  <!-- Loading screen -->
  <div id="loading-screen">
    <h1>SPACE COWBOY</h1>
    <p>Initializing VLEO systems…</p>
  </div>

  <!-- Three.js canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- HUD overlay (pointer-events: none — clicks pass through to canvas) -->
  <div id="hud-overlay"></div>

  <!-- Game bootstrap -->
  <!-- F7 boot resilience — this classic script runs BEFORE the deferred ES
       module below, so it can (a) verify WebGL2 up front with a friendly
       message, and (b) catch any uncaught boot error / promise rejection and
       show a retro failure card with a Reload button instead of the old silent
       black screen. The loading screen is dismissed ONLY by main.js on success
       (it sets window.__bootOk), so we no longer hide it on window.load — that
       used to mask a failed boot as a black screen. -->
  <script>
    (function () {
      var shown = false;
      function esc(s) {
        return String(s == null ? '' : s).replace(/[<>&]/g, function (c) {
          return c === '<' ? '&lt;' : c === '>' ? '&gt;' : '&amp;';
        });
      }
      function showBootFailure(title, detailHtml) {
        // Never show over a successfully-booted game (post-boot runtime errors
        // are not boot failures), and only show once.
        if (shown || window.__bootOk) return;
        shown = true;
        var card = document.createElement('div');
        card.id = 'boot-failure';
        card.setAttribute('role', 'alert');
        card.style.cssText = 'position:fixed;inset:0;z-index:1000;display:flex;' +
          'flex-direction:column;align-items:center;justify-content:center;background:#000;' +
          'color:#00ff88;font-family:\'Courier New\',monospace;text-align:center;padding:24px;';
        card.innerHTML =
          '<div style="font-size:2rem;letter-spacing:0.25em;text-shadow:0 0 18px rgba(0,255,136,0.5);margin-bottom:14px;">' +
            esc(title || 'SYSTEMS OFFLINE') + '</div>' +
          '<div style="max-width:560px;color:rgba(0,255,136,0.7);font-size:0.95rem;line-height:1.6;margin-bottom:22px;">' +
            (detailHtml || 'The simulation failed to start.') + '</div>' +
          '<button id="boot-reload" type="button" style="font-family:inherit;color:#00ff88;' +
            'background:rgba(0,255,136,0.1);border:2px solid rgba(0,255,136,0.5);padding:10px 32px;' +
            'border-radius:4px;letter-spacing:0.15em;cursor:pointer;">RELOAD ↻</button>';
        (document.body || document.documentElement).appendChild(card);
        var btn = document.getElementById('boot-reload');
        if (btn) btn.addEventListener('click', function () { window.location.reload(); });
      }
      window.__showBootFailure = showBootFailure;

      // (a) WebGL2 capability check — the friendliest possible message.
      try {
        if (!document.createElement('canvas').getContext('webgl2')) {
          showBootFailure('WEBGL2 REQUIRED',
            'Space Cowboy needs a WebGL2-capable browser with hardware acceleration ' +
            'enabled. Try a recent Chrome, Edge, Firefox or Safari and make sure ' +
            'hardware acceleration is turned on.');
        }
      } catch (e) { /* getContext can throw when locked down — the error path covers it */ }

      // (b) Uncaught boot error / rejection → failure card (scoped to boot via __bootOk).
      window.addEventListener('error', function (e) {
        showBootFailure('SYSTEMS OFFLINE',
          'The simulation hit an error while starting.<br><br><code style="color:rgba(0,255,136,0.55);' +
          'font-size:0.8rem;">' + esc(e && (e.message || (e.error && e.error.message))) + '</code>');
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e && e.reason;
        showBootFailure('SYSTEMS OFFLINE',
          'The simulation failed to initialize.<br><br><code style="color:rgba(0,255,136,0.55);' +
          'font-size:0.8rem;">' + esc(r && (r.message || r)) + '</code>');
      });
    })();
  </script>
  <script type="module">
    // main.js hides #loading-screen and sets window.__bootOk on success.
    import './js/main.js';
  </script>

  <!-- PR P0.3 — Service Worker registration. Relative path resolves to
       the page's directory: '/' locally, '/SCB/' on GitHub Pages. -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('[SW] registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
